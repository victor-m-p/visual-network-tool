{% extends "global/Page.html" %} {% load otree %} {% block styles %}
<style>
  .selector-card {
    border: 1px solid #e6e6e6;
    background: #fafafa;
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
  }
  .selector-card h3 { margin: 0 0 0.5rem 0; font-size: 1.15rem; }
  .selector-card p  { color: #555; margin: 0 0 1rem 0; }

  /* Style the RadioSelect options as cards */
  .otree-form .controls label {
    display: block;
    border: 2px solid #e6e6e6;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    font-size: 0.97rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .otree-form .controls label:hover {
    border-color: #aaa;
    background: #f0f0f0;
  }
  .otree-form .controls input[type="radio"]:checked + span,
  .otree-form .controls label:has(input:checked) {
    border-color: #111;
    background: #f5f5f5;
    font-weight: 700;
  }
</style>
{% endblock %} {% block content %}

<div class="selector-card">
  <h3>Select experimental condition</h3>
  <p>This page is for testing only. Choose which condition to run through.</p>
</div>

{% formfield player.condition label="Which condition?" %}

{{ next_button }}

{% endblock %}
